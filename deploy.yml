- name: Deploy Maven Artifact (Jenkins User Accessible)
  hosts: localhost
  become: no  # Run tasks with sudo privileges
  tasks:
    - name: Ensure deployment directory exists
      ansible.builtin.file:
        path: /home/thejan/deployment
        state: directory
        mode: '0755'

    - name: Copy the artifact to the deployment directory
      ansible.builtin.copy:
        src:  /mnt/c/Users/atme/.jenkins/workspace/p8_CI/target/HelloMaven-1.0-SNAPSHOT.jar  # Path to your JAR file in the local system
        dest: /home/thejan/deployment  # Where you want to copy the JAR on the local machine
        remote_src: yes # Indicates the source is on the local machine